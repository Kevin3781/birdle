<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Small perching songbird silhouette">
  <g fill="currentColor">
    <!-- perch -->
    <rect x="55" y="150" width="90" height="6"/>
    <!-- body -->
    <ellipse cx="100" cy="108" rx="34" ry="28"/>
    <!-- head -->
    <circle cx="128" cy="82" r="20"/>
    <!-- bill -->
    <path d="M146 80 l20 4 -20 6 z"/>
    <!-- tail -->
    <path d="M66 112 l-40 14 6 -22 z"/>
    <!-- legs -->
    <rect x="92" y="134" width="4" height="18"/>
    <rect x="110" y="134" width="4" height="18"/>
  </g>
</svg>
