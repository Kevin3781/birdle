<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Parrot silhouette">
  <g fill="currentColor">
    <rect x="55" y="160" width="60" height="6"/>
    <!-- upright body -->
    <ellipse cx="92" cy="100" rx="28" ry="40"/>
    <!-- broad head -->
    <circle cx="118" cy="60" r="22"/>
    <!-- crest -->
    <path d="M116 40 q-4 -22 10 -28 q6 14 -2 28 z"/>
    <!-- strong hooked bill -->
    <path d="M138 56 q14 0 12 12 q-2 10 -14 8 q4 -6 0 -12 q8 -4 2 -8 z"/>
    <!-- long tapering tail -->
    <path d="M82 132 l-10 50 18 -16 6 -34 z"/>
    <!-- feet -->
    <rect x="84" y="150" width="5" height="12"/>
    <rect x="100" y="150" width="5" height="12"/>
  </g>
</svg>
